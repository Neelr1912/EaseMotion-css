<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Background Emphasis - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Slide Background Emphasis</h1>
    <p class="subtitle">A smooth gradient slide animation that sweeps horizontally across a button during emphasis interactions.</p>
    
    <div class="button-container">
      <!-- Default: Purple-Blue Gradient Slide -->
      <button class="slide-bg-btn slide-bg-emphasis">
        Purple-Blue Slide
      </button>
      
      <!-- Variant 2: Cyan-Teal Gradient -->
      <button class="slide-bg-btn slide-bg-emphasis-cyan">
        Cyan-Teal Slide
      </button>
      
      <!-- Variant 3: Pink-Orange Gradient -->
      <button class="slide-bg-btn slide-bg-emphasis-pink">
        Pink-Orange Slide
      </button>
    </div>
  </div>
</body>
</html>
